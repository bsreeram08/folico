name: Feature request
description: Suggest an improvement for Folico.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Folico do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - macOS UI
        - CLI
        - MCP
        - Icon rules
        - Restore/history
        - Packaging
        - Docs
    validations:
      required: true
